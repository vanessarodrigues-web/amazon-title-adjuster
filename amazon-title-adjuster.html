<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Title Adjuster - SellersFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
        }

        .upload-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .upload-zone {
            border: 2px dashed #475569;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }

        .upload-zone.dragover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .upload-text {
            margin-bottom: 8px;
            font-weight: 600;
        }

        .upload-subtext {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input[type="file"] {
            display: none;
        }

        .button {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-decoration: none;
            margin: 8px 4px;
        }

        .button-primary {
            background: linear-gradient(135deg, #38bdf8, #06b6d4);
            color: #0f172a;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .button-secondary {
            background: #1e293b;
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .button-secondary:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            display: none;
            backdrop-filter: blur(10px);
        }

        .results-section.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .results-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: rgba(15, 23, 42, 0.8);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 2px solid #38bdf8;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .original-title {
            color: #cbd5e1;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            max-width: 400px;
            overflow-wrap: break-word;
        }

        .adjusted-title {
            color: #38bdf8;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            max-width: 400px;
            overflow-wrap: break-word;
            font-weight: 500;
        }

        .character-count {
            display: inline-block;
            background: rgba(56, 189, 248, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #38bdf8;
            margin-left: 8px;
            font-weight: 600;
        }

        .warning {
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: #fed7aa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #bbf7d0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .column-selector {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .column-selector-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #cbd5e1;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .upload-section {
                padding: 20px;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px 8px;
            }

            .original-title, .adjusted-title {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Amazon Title Adjuster</h1>
            <p class="subtitle">Ajuste automático de títulos para 75 caracteres</p>
        </header>

        <div class="upload-section">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📤</div>
                <div class="upload-text">Arraste sua planilha aqui</div>
                <div class="upload-subtext">ou clique para selecionar CSV / XLSX</div>
            </div>
            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
            <button class="button button-secondary" id="selectBtn">Selecionar Arquivo</button>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <span class="results-title">✅ Processamento Concluído</span>
                <button class="button button-secondary" id="resetBtn">Nova Planilha</button>
            </div>

            <div id="warningBox"></div>

            <div class="column-selector">
                <label class="column-selector-label" for="columnSelect">Coluna com títulos:</label>
                <select id="columnSelect">
                    <option value="">-- Selecione a coluna --</option>
                </select>
            </div>

            <div class="stats" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-label">Total de Títulos</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ajustados (>75 chars)</div>
                    <div class="stat-value" id="adjustedCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Caracteres Removidos</div>
                    <div class="stat-value" id="totalRemoved">0</div>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th style="width: 40%;">Título Original</th>
                            <th style="width: 40%;">Título Ajustado</th>
                            <th style="width: 20%;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <div class="download-buttons">
                <button class="button button-primary" id="downloadCSV">⬇️ Baixar CSV</button>
                <button class="button button-primary" id="downloadXLSX">⬇️ Baixar XLSX</button>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const selectBtn = document.getElementById('selectBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsSection = document.getElementById('resultsSection');
        const columnSelect = document.getElementById('columnSelect');

        let processedData = [];
        let originalFile = null;

        selectBtn.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            originalFile = file;
            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                    if (jsonData.length === 0) {
                        showError('Planilha vazia. Adicione títulos e tente novamente.');
                        return;
                    }

                    const columns = Object.keys(jsonData[0]);
                    populateColumnSelect(columns);
                    processedData = jsonData;
                    resultsSection.classList.add('active');
                } catch (error) {
                    showError('Erro ao ler o arquivo. Verifique se é um CSV ou XLSX válido.');
                    console.error(error);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function populateColumnSelect(columns) {
            columnSelect.innerHTML = '<option value="">-- Selecione a coluna --</option>';
            columns.forEach(col => {
                const option = document.createElement('option');
                option.value = col;
                option.textContent = col;
                columnSelect.appendChild(option);
            });

            // Auto-select if there's a likely candidate
            const titleCol = columns.find(c => 
                c.toLowerCase().includes('título') || 
                c.toLowerCase().includes('title') ||
                c.toLowerCase().includes('nome')
            );
            if (titleCol) {
                columnSelect.value = titleCol;
                processColumns(titleCol);
            }
        }

        columnSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                processColumns(e.target.value);
            }
        });

        function processColumns(columnName) {
            const results = processedData.map((row, index) => {
                const original = String(row[columnName] || '').trim();
                const adjusted = original.substring(0, 75);
                const wasCut = original.length > 75;

                return {
                    index,
                    original,
                    adjusted,
                    wasCut,
                    charsRemoved: Math.max(0, original.length - 75)
                };
            });

            renderResults(results, columnName);
        }

        function renderResults(results, columnName) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            let adjustedCount = 0;
            let totalRemoved = 0;

            results.forEach(result => {
                if (result.wasCut) adjustedCount++;
                totalRemoved += result.charsRemoved;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="original-title">${escapeHtml(result.original)}</div>
                        <span class="character-count">${result.original.length}</span>
                    </td>
                    <td>
                        <div class="adjusted-title">${escapeHtml(result.adjusted)}</div>
                        <span class="character-count">${result.adjusted.length}</span>
                    </td>
                    <td>${result.wasCut ? '✂️ Ajustado' : '✅ OK'}</td>
                `;
                tableBody.appendChild(row);
            });

            // Update stats
            document.getElementById('totalCount').textContent = results.length;
            document.getElementById('adjustedCount').textContent = adjustedCount;
            document.getElementById('totalRemoved').textContent = totalRemoved;

            // Store processed results for download
            window.currentResults = results.map((r, i) => ({
                ...processedData[i],
                [columnName + '_original']: r.original,
                [columnName + '_adjusted']: r.adjusted,
                'status': r.wasCut ? 'Ajustado' : 'OK'
            }));

            window.titleColumnName = columnName;
        }

        document.getElementById('downloadCSV').addEventListener('click', () => {
            downloadFile('csv');
        });

        document.getElementById('downloadXLSX').addEventListener('click', () => {
            downloadFile('xlsx');
        });

        function downloadFile(format) {
            if (!window.currentResults) return;

            const fileName = `amazon-titles-adjusted_${new Date().toISOString().slice(0, 10)}`;

            if (format === 'csv') {
                const csv = convertToCSV(window.currentResults);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                downloadBlob(blob, `${fileName}.csv`);
            } else {
                const ws = XLSX.utils.json_to_sheet(window.currentResults);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Títulos');
                XLSX.writeFile(wb, `${fileName}.xlsx`);
            }
        }

        function convertToCSV(data) {
            if (!data || data.length === 0) return '';

            const headers = Object.keys(data[0]);
            const csv = [headers.map(h => `"${h}"`).join(',')];

            data.forEach(row => {
                csv.push(headers.map(h => {
                    const value = row[h] || '';
                    return `"${String(value).replace(/"/g, '""')}"`;
                }).join(','));
            });

            return csv.join('\n');
        }

        function downloadBlob(blob, fileName) {
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        resetBtn.addEventListener('click', () => {
            resultsSection.classList.remove('active');
            fileInput.value = '';
            processedData = [];
            window.currentResults = null;
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const warningBox = document.getElementById('warningBox');
            warningBox.innerHTML = `<div class="warning">⚠️ ${message}</div>`;
            resultsSection.classList.add('active');
            setTimeout(() => {
                warningBox.innerHTML = '';
                resultsSection.classList.remove('active');
            }, 5000);
        }
    </script>
</body>
</html>
